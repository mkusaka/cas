name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run rustfmt
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Verify package
        run: cargo package --locked --no-verify

  release:
    name: Create Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      source_sha256: ${{ steps.source_archive.outputs.sha256 }}
      source_url: ${{ steps.source_archive.outputs.url }}
      release_url: ${{ steps.version.outputs.release_url }}
      formula_name: ${{ steps.formula.outputs.formula_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set formula metadata
        id: formula
        run: |
          echo "formula_name=cas" >> "$GITHUB_OUTPUT"

      - name: Validate tag version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)

          if [[ -z "$PACKAGE_VERSION" ]]; then
            echo "::error::Could not read package version from Cargo.toml"
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) must match Cargo.toml version ($PACKAGE_VERSION)"
            exit 1
          fi

          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists"
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --verify-tag \
            --title "cas $GITHUB_REF_NAME" \
            --generate-notes

      - name: Compute source archive SHA256
        id: source_archive
        run: |
          SOURCE_ARCHIVE="cas-${VERSION}.tar.gz"
          SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"

          curl --fail --location --retry 5 --retry-delay 2 --output "$SOURCE_ARCHIVE" "$SOURCE_URL"

          SHA256=$(shasum -a 256 "$SOURCE_ARCHIVE" | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "url=$SOURCE_URL" >> "$GITHUB_OUTPUT"

  bottle:
    name: Build Bottle (${{ matrix.label }})
    needs: release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-15
            bottle_tag: arm64_sequoia
          - label: Intel
            runner: macos-15-intel
            bottle_tag: sequoia
          - label: Tahoe Apple Silicon
            runner: macos-26
            bottle_tag: arm64_tahoe
          - label: Tahoe Intel
            runner: macos-26-intel
            bottle_tag: tahoe
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone Homebrew tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/mkusaka/homebrew-tap"
          mkdir -p "$(dirname "$TAP_DIR")"
          rm -rf "$TAP_DIR"
          git clone https://github.com/mkusaka/homebrew-tap "$TAP_DIR"

      - name: Render formula for release
        env:
          FORMULA_NAME: ${{ needs.release.outputs.formula_name }}
          VERSION: ${{ needs.release.outputs.version }}
          SOURCE_SHA256: ${{ needs.release.outputs.source_sha256 }}
          SOURCE_URL: ${{ needs.release.outputs.source_url }}
          RELEASE_URL: ${{ needs.release.outputs.release_url }}
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/mkusaka/homebrew-tap"
          FORMULA_PATH="$TAP_DIR/Formula/${FORMULA_NAME}.rb"
          mkdir -p "$(dirname "$FORMULA_PATH")"
          cp packaging/homebrew/cas.rb "$FORMULA_PATH"
          export FORMULA_PATH

          ruby <<'RUBY'
          path = ENV.fetch("FORMULA_PATH")
          text = File.read(path)

          replacements = {
            "__SOURCE_URL__" => ENV.fetch("SOURCE_URL"),
            "__VERSION__" => ENV.fetch("VERSION"),
            "__SOURCE_SHA256__" => ENV.fetch("SOURCE_SHA256"),
            "__ROOT_URL__" => ENV.fetch("RELEASE_URL"),
            "__ARM64_TAHOE_SHA256__" => "arm64_tahoe_sha256_placeholder",
            "__TAHOE_SHA256__" => "tahoe_sha256_placeholder",
            "__ARM64_SEQUOIA_SHA256__" => "arm64_sequoia_sha256_placeholder",
            "__SEQUOIA_SHA256__" => "sequoia_sha256_placeholder",
          }

          replacements.each do |placeholder, replacement|
            text.gsub!(placeholder, replacement)
          end

          # Build the bottle from source before bottle metadata exists.
          text.sub!(/  bottle do\n(?:    .*\n)*  end\n\n/, "")

          File.write(path, text)
          RUBY

          cat "$FORMULA_PATH"

      - name: Build bottle
        env:
          FORMULA_NAME: ${{ needs.release.outputs.formula_name }}
          BOTTLE_TAG: ${{ matrix.bottle_tag }}
          HOMEBREW_NO_INSTALL_FROM_API: "1"
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install --build-bottle "mkusaka/tap/${FORMULA_NAME}"
          HOMEBREW_NO_AUTO_UPDATE=1 brew bottle --no-rebuild --root-url "${{ needs.release.outputs.release_url }}" "mkusaka/tap/${FORMULA_NAME}"

          BOTTLE_FILE=$(find . -maxdepth 1 -name "${FORMULA_NAME}--*.bottle*.tar.gz" -print | head -n 1)
          if [[ -z "$BOTTLE_FILE" ]]; then
            echo "::error::Bottle file was not generated"
            exit 1
          fi

          SHA256=$(shasum -a 256 "$BOTTLE_FILE" | awk '{print $1}')
          UPLOAD_FILE="${FORMULA_NAME}-${VERSION}.${BOTTLE_TAG}.bottle.tar.gz"
          cp "$BOTTLE_FILE" "$UPLOAD_FILE"

          {
            echo "BOTTLE_FILE=$BOTTLE_FILE"
            echo "UPLOAD_FILE=$UPLOAD_FILE"
            echo "SHA256=$SHA256"
          } >> "$GITHUB_ENV"

          cat > "bottle-metadata-${BOTTLE_TAG}.json" <<EOF
          {
            "bottle_tag": "${BOTTLE_TAG}",
            "sha256": "${SHA256}",
            "file": "${UPLOAD_FILE}"
          }
          EOF

      - name: Upload bottle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" "$UPLOAD_FILE" --clobber

      - name: Upload bottle metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bottle-metadata-${{ matrix.bottle_tag }}
          path: bottle-metadata-${{ matrix.bottle_tag }}.json

  publish:
    name: Publish Release
    needs: [release, bottle]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote draft to published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --draft=false --repo "$GITHUB_REPOSITORY"

  update_homebrew_tap:
    name: Update Homebrew Tap
    needs: [release, bottle, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download bottle metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bottle-metadata-*
          merge-multiple: true

      - name: Check Homebrew tap token
        id: tap_token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::notice::Skipping Homebrew tap update because HOMEBREW_TAP_TOKEN is not configured"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Clone Homebrew tap
        if: steps.tap_token.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh repo clone mkusaka/homebrew-tap homebrew-tap
          git -C homebrew-tap remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/mkusaka/homebrew-tap.git"

      - name: Render tap formula
        if: steps.tap_token.outputs.available == 'true'
        env:
          FORMULA_NAME: ${{ needs.release.outputs.formula_name }}
          REPOSITORY_NAME: ${{ github.repository }}
          VERSION: ${{ needs.release.outputs.version }}
          SOURCE_SHA256: ${{ needs.release.outputs.source_sha256 }}
          SOURCE_URL: ${{ needs.release.outputs.source_url }}
          RELEASE_URL: ${{ needs.release.outputs.release_url }}
        run: |
          ARM64_TAHOE_SHA256=$(jq -r 'select(.bottle_tag == "arm64_tahoe") | .sha256' bottle-metadata-*.json)
          TAHOE_SHA256=$(jq -r 'select(.bottle_tag == "tahoe") | .sha256' bottle-metadata-*.json)
          ARM64_SHA256=$(jq -r 'select(.bottle_tag == "arm64_sequoia") | .sha256' bottle-metadata-*.json)
          INTEL_SHA256=$(jq -r 'select(.bottle_tag == "sequoia") | .sha256' bottle-metadata-*.json)

          if [[ -z "$ARM64_TAHOE_SHA256" || "$ARM64_TAHOE_SHA256" == "null" ]]; then
            echo "::error::Missing arm64 Tahoe bottle metadata"
            exit 1
          fi
          if [[ -z "$TAHOE_SHA256" || "$TAHOE_SHA256" == "null" ]]; then
            echo "::error::Missing Tahoe Intel bottle metadata"
            exit 1
          fi
          if [[ -z "$ARM64_SHA256" || "$ARM64_SHA256" == "null" ]]; then
            echo "::error::Missing arm64 Sequoia bottle metadata"
            exit 1
          fi
          if [[ -z "$INTEL_SHA256" || "$INTEL_SHA256" == "null" ]]; then
            echo "::error::Missing Sequoia Intel bottle metadata"
            exit 1
          fi

          FORMULA_PATH="homebrew-tap/Formula/${FORMULA_NAME}.rb"
          mkdir -p "$(dirname "$FORMULA_PATH")"
          cp packaging/homebrew/cas.rb "$FORMULA_PATH"
          export FORMULA_PATH
          export ARM64_TAHOE_SHA256
          export TAHOE_SHA256
          export ARM64_SHA256
          export INTEL_SHA256

          ruby <<'RUBY'
          path = ENV.fetch("FORMULA_PATH")
          text = File.read(path)

          replacements = {
            "__SOURCE_URL__" => ENV.fetch("SOURCE_URL"),
            "__VERSION__" => ENV.fetch("VERSION"),
            "__SOURCE_SHA256__" => ENV.fetch("SOURCE_SHA256"),
            "__ROOT_URL__" => ENV.fetch("RELEASE_URL"),
            "__ARM64_TAHOE_SHA256__" => ENV.fetch("ARM64_TAHOE_SHA256"),
            "__TAHOE_SHA256__" => ENV.fetch("TAHOE_SHA256"),
            "__ARM64_SEQUOIA_SHA256__" => ENV.fetch("ARM64_SHA256"),
            "__SEQUOIA_SHA256__" => ENV.fetch("INTEL_SHA256"),
          }

          replacements.each do |placeholder, replacement|
            text.gsub!(placeholder, replacement)
          end

          if text.include?("__")
            raise "formula still contains unreplaced placeholders"
          end

          File.write(path, text)
          RUBY

          ruby -c "$FORMULA_PATH"
          cat "$FORMULA_PATH"

      - name: Commit and push tap update
        if: steps.tap_token.outputs.available == 'true'
        env:
          FORMULA_NAME: ${{ needs.release.outputs.formula_name }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add "Formula/${FORMULA_NAME}.rb"
          git -C homebrew-tap diff --cached --quiet && echo "No changes" && exit 0
          git -C homebrew-tap commit -m "bump ${FORMULA_NAME} to ${VERSION}"
          git -C homebrew-tap push origin HEAD:main
